name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app
        run: ./build.sh

      - name: Create zip archive
        run: |
          chmod +x "build/DNS Switcher.app/Contents/MacOS/DNS Switcher"
          cd build
          ditto -c -k --sequesterRsrc --keepParent "DNS Switcher.app" "../DNS-Switcher-macOS.zip"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: DNS-Switcher-macOS.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
